// ── 날짜 유틸 ──
function parseDate(raw){
  if(!raw)return null;
  const s=String(raw).replace(/-/g,"").trim();
  if(s.length!==8)return null;
  const d=new Date(s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8));
  return isNaN(d)?null:d;
}
function fmtDate(d){
  if(!d)return"-";
  const dt=typeof d==="string"?new Date(d):d;
  return isNaN(dt)?"-":dt.toISOString().slice(0,10).replace(/-/g,"");
}
// 오늘 날짜 항상 동적 계산 — 대한민국 서울(KST, UTC+9) 기준
function today(){return new Date(new Date().getTime()+9*60*60*1000).toISOString().slice(0,10);}
function addDays(ymd,n){const d=new Date(ymd);d.setDate(d.getDate()+n);return new Date(d.getTime()+9*60*60*1000).toISOString().slice(0,10);}
// YYYYMMDD 형식 검증
function validateYMD8(raw){
  const s=String(raw||"").replace(/-/g,"").trim();
  if(!/^\d{8}$/.test(s))return null;
  const d=new Date(s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8));
  return isNaN(d)?null:d;
}

// ── 재고 차감 ──
function fifoDeduct(stock,sCode,need){
  const sorted=stock.filter(s=>s.s_code===sCode&&s.qty>0).sort((a,b)=>new Date(a.expiry)-new Date(b.expiry));
  let rem=need;const used=[];const next=stock.map(s=>({...s}));
  for(const s of sorted){
    if(rem<=0)break;
    const take=Math.min(s.qty,rem);
    used.push({expiry:s.expiry,qty:take,id:s.id});
    rem-=take;
    const idx=next.findIndex(x=>x.id===s.id);
    if(idx!==-1)next[idx].qty-=take;
  }
  return{ok:rem===0,used,next,shortage:rem};
}
function smartDeduct(stock,sCode,need){
  const exps=[...new Set(stock.filter(s=>s.s_code===sCode&&s.qty>0).map(s=>s.expiry))].sort();
  for(const exp of exps){
    const rows=stock.filter(s=>s.s_code===sCode&&s.qty>0&&s.expiry===exp);
    const total=rows.reduce((sum,s)=>sum+s.qty,0);
    if(total>=need){
      let rem=need;const used=[];const next=stock.map(s=>({...s}));
      for(const s of rows){
        if(rem<=0)break;
        const take=Math.min(s.qty,rem);
        used.push({expiry:s.expiry,qty:take,id:s.id});
        rem-=take;
        const idx=next.findIndex(x=>x.id===s.id);
        if(idx!==-1)next[idx].qty-=take;
      }
      return{ok:true,used,next,shortage:0};
    }
  }
  return fifoDeduct(stock,sCode,need);
}
function findUnifiedExpiry(stock,recipe,totalQty){
  const allExp=[...new Set(stock.filter(s=>s.qty>0).map(s=>s.expiry))].sort();
  for(const exp of allExp){
    let ok=true;
    for(const comp of recipe){
      const need=comp.qty*totalQty;
      const total=stock.filter(s=>s.s_code===comp.s_code&&s.qty>0&&s.expiry===exp).reduce((sum,s)=>sum+s.qty,0);
      if(total<need){ok=false;break;}
    }
    if(ok)return exp;
  }
  return null;
}
function makeLotKey(d){return d.map(x=>x.sCode+":"+x.expiry).sort().join("|");}
async function assignLot(finExp,detailsWithExp,p_code){
  const curKey=makeLotKey(detailsWithExp);
  const{data:logs}=await sb.from("drip2_prod_log").select("lot,lot_key").eq("p_code",p_code).not("lot","is",null).order("created_at",{ascending:true});
  const validLogs=(logs||[]).filter(l=>l.lot&&l.lot_key);
  const existing=validLogs.find(l=>l.lot_key===curKey);
  if(existing)return existing.lot;
  const usedAlpha=new Set(validLogs.filter(l=>l.lot&&l.lot.startsWith(finExp)).map(l=>l.lot.slice(-1)));
  for(let i=0;i<26;i++){const alpha=String.fromCharCode(65+i);if(!usedAlpha.has(alpha))return finExp+alpha;}
  return finExp+"Z";
}

// ══ 대한민국 시계 (KST) ══════════════════
function KstClock(){
  const[now,setNow]=useState(()=>new Date(new Date().getTime()+9*60*60*1000));
  useEffect(()=>{const t=setInterval(()=>setNow(new Date(new Date().getTime()+9*60*60*1000)),1000);return()=>clearInterval(t);},[]);
  const yyyy=now.getUTCFullYear();
  const mm=String(now.getUTCMonth()+1).padStart(2,"0");
  const dd=String(now.getUTCDate()).padStart(2,"0");
  const hh=String(now.getUTCHours()).padStart(2,"0");
  const mi=String(now.getUTCMinutes()).padStart(2,"0");
  const ss=String(now.getUTCSeconds()).padStart(2,"0");
  const days=["일","월","화","수","목","금","토"];
  const day=days[now.getUTCDay()];
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"5px 14px",background:"rgba(255,255,255,.07)",border:"1px solid #6a8a5a55",borderRadius:10,lineHeight:1.3}}>
      <div style={{fontSize:11,color:"#8ecf90",fontWeight:600,letterSpacing:.5}}>🇰🇷 대한민국 (KST)</div>
      <div style={{fontSize:13,color:"#f5c97a",fontWeight:700,letterSpacing:.5}}>{yyyy}.{mm}.{dd} ({day})</div>
      <div style={{fontSize:17,color:"#e8f0e0",fontWeight:700,fontVariantNumeric:"tabular-nums",letterSpacing:1}}>{hh}:{mi}:{ss}</div>
    </div>
  );
}

          <button onClick={doSignup} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#5a7a4a,#7a9a6a)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",opacity:loading?.6:1}}>
            {loading?"처리 중...":"계정 만들기"}
          </button>
        </>)}

        {/* 비밀번호 변경 */}
        {mode==="changepw"&&(<>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18}}>
            <span onClick={()=>switchMode("login")} style={{fontSize:13,color:"#8a9a88",cursor:"pointer"}}>← 돌아가기</span>
            <span style={{fontSize:15,fontWeight:700,color:"#c8ddb8"}}>비밀번호 변경</span>
          </div>
          <div style={{marginBottom:13}}><div style={lbl}>마스터 코드</div>
            <input autoFocus type="password" value={masterCode} onChange={e=>setMasterCode(e.target.value)} onKeyDown={onKey} placeholder="마스터 코드 입력" style={inpS}/></div>
          <div style={{marginBottom:13}}><div style={lbl}>아이디</div>
            <input value={userId} onChange={e=>setUserId(e.target.value)} onKeyDown={onKey} placeholder="변경할 계정 아이디" style={inpS}/></div>
          <div style={{marginBottom:13}}><div style={lbl}>새 비밀번호</div>
            <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} onKeyDown={onKey} placeholder="4자 이상" style={inpS}/></div>
          <div style={{marginBottom:13}}><div style={lbl}>새 비밀번호 확인</div>
            <input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} onKeyDown={onKey} placeholder="새 비밀번호 재입력" style={inpS}/></div>
          {msg&&<div style={{padding:"8px 12px",borderRadius:8,fontSize:13,marginBottom:12,background:msg.type==="ok"?"rgba(76,175,80,.15)":"rgba(220,70,70,.15)",border:"1px solid "+(msg.type==="ok"?"#4caf5055":"#e0707055"),color:msg.type==="ok"?"#6fcf97":"#f08080"}}>{msg.text}</div>}
          <button onClick={doChangePw} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#5a7a4a,#7a9a6a)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",opacity:loading?.6:1}}>
            {loading?"처리 중...":"비밀번호 변경"}
          </button>
        </>)}
      </div>
    </div>
  );
}

// ══ OrderCard — 수정 시 업체 드롭다운 지원 ═
function OrderCard({order,pName,sName,fmtDate,invest,delOrder,updateOrder,confirmOrder,completeOrder,revertOrder,cancelOrder,primaryBtn,delBtn,moveOrder,isFirst,isLast,channels}){
  const[editing,setEditing]=useState(false);
  const[qty,setQty]=useState(String(order.qty));
  const[editChId,setEditChId]=useState("");
  const inpS={background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",borderRadius:6,color:"#f0e6d3",padding:"5px 8px",fontSize:13,outline:"none",fontFamily:"inherit"};
  const activeChannels=channels.filter(c=>c.active!==false);
  const startEdit=()=>{
    const cur=channels.find(c=>c.name===order.channel);
    setEditChId(cur?String(cur.id):activeChannels[0]?String(activeChannels[0].id):"");
    setQty(String(order.qty));setEditing(true);
  };
  const saveEdit=()=>{
    const ch=channels.find(c=>String(c.id)===String(editChId));
    updateOrder(order.id,parseInt(qty)||order.qty,ch?.name||order.channel);setEditing(false);
  };
  const moveBtn={background:"rgba(255,255,255,.08)",border:"1px solid #7a8a7044",borderRadius:5,color:"#a8b8a0",padding:"3px 7px",fontSize:13,cursor:"pointer",fontFamily:"inherit",lineHeight:1};
  const ch=channels.find(c=>c.name===order.channel);

  // 3단계 색상
  const isConfirmed=order.status==="확정";
  const isDone=order.status==="완료";
  const isPlan=order.status==="대기"||order.status==="투입완료";
  const borderColor=isDone?"#6aaf6a55":isConfirmed?"#c8a06a55":order.status==="투입완료"?"#5a8fc055":"#7a8a7044";
  const bgColor=isDone?"rgba(60,100,55,.2)":isConfirmed?"rgba(160,110,20,.18)":order.status==="투입완료"?"rgba(50,80,120,.2)":"rgba(255,255,255,.06)";

  const statusChip=isDone
    ?<span style={{background:"rgba(60,160,60,.3)",border:"1px solid #6aaf6a77",color:"#6fcf97",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700}}>✅ 완료</span>
    :isConfirmed
    ?<span style={{background:"rgba(160,110,20,.35)",border:"1px solid #c8a06a77",color:"#f5c97a",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700}}>📋 생산확정</span>
    :order.status==="투입완료"
    ?<span style={{background:"rgba(50,100,180,.3)",border:"1px solid #5a8fc077",color:"#8ac8f0",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700}}>🔵 투입완료</span>
    :<span style={{background:"rgba(200,130,26,.2)",border:"1px solid #c8821a55",color:"#f2c94c",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700}}>⏳ 대기</span>;

  return(
    <div style={{background:bgColor,border:"1px solid "+borderColor,borderRadius:12,padding:"13px 16px",marginBottom:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        {isPlan&&moveOrder&&(
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <button onClick={()=>moveOrder(order.id,-1)} disabled={isFirst} style={{...moveBtn,opacity:isFirst?.3:1}}>▲</button>
            <button onClick={()=>moveOrder(order.id,1)} disabled={isLast} style={{...moveBtn,opacity:isLast?.3:1}}>▼</button>
          </div>
        )}
        {order.plan_date&&<span style={{background:"rgba(90,140,200,.25)",border:"1px solid #5a8fc055",color:"#8ac8d8",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>📅 {order.plan_date}</span>}
        <span style={{background:"#5a7a4a",color:"#fff",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700}}>P{order.priority}</span>
        <span style={{color:"#9a7050",fontSize:12}}>[{order.p_code}]</span>
        <span style={{fontWeight:700,fontSize:15,color:"#f5c97a"}}>{pName(order.p_code)}</span>
        {order.channel&&<ChannelBadge name={order.channel} color={ch?.color} color2={ch?.color2} size="sm"/>}
        {statusChip}
        {editing&&order.status==="대기"?(
          <>
            <input type="number" value={qty} onChange={e=>setQty(e.target.value)} style={{...inpS,width:70}}/>
            <span style={{color:"#aaa",fontSize:12}}>개</span>
            <select value={editChId} onChange={e=>setEditChId(e.target.value)} style={{...inpS,cursor:"pointer"}}>
              {activeChannels.map(c=><option key={c.id} value={String(c.id)}>{c.name}</option>)}
            </select>
            <button onClick={saveEdit} style={{...primaryBtn,fontSize:12,padding:"4px 12px"}}>저장</button>
            <button onClick={()=>setEditing(false)} style={{...delBtn,fontSize:12,padding:"4px 10px"}}>취소</button>
          </>
        ):(
          <span style={{color:"#e0c090"}}>{order.qty}개</span>
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
          {order.status==="대기"&&!editing&&<button onClick={startEdit} style={{background:"rgba(200,130,26,.2)",border:"1px solid #c8821a55",color:"#c8a06a",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✏️ 수정</button>}
          {order.status==="대기"&&!editing&&<button onClick={()=>invest(order.id)} style={{...primaryBtn,fontSize:13,padding:"5px 14px"}}>낱개 투입</button>}
          {order.status==="투입완료"&&!editing&&<button onClick={()=>confirmOrder(order.id)} style={{background:"linear-gradient(135deg,#7a6020,#b08a30)",border:"1px solid #c8a06a66",color:"#f5e8a0",borderRadius:6,padding:"5px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>📋 생산확정</button>}
          {isConfirmed&&!editing&&<button onClick={()=>completeOrder(order.id)} style={{background:"#2d6a2d",border:"1px solid #4caf5066",color:"#6fcf97",borderRadius:6,padding:"5px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✅ 완료</button>}
          {/* 복귀 버튼 */}
          {(isDone||isConfirmed)&&!editing&&<button onClick={()=>revertOrder(order.id)} style={{background:"rgba(90,130,200,.2)",border:"1px solid #5a8fc055",color:"#8ac8d8",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>🔄 복귀</button>}
          {/* 생산취소: 완료 상태에서만 */}
          {isDone&&!editing&&<button onClick={()=>cancelOrder&&cancelOrder(order.id)} style={{background:"rgba(160,40,40,.3)",border:"1px solid #c0404055",color:"#ff9090",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>🚫 생산취소</button>}
          {isPlan&&!editing&&<button onClick={()=>delOrder(order.id)} style={delBtn}>✕</button>}
        </div>
      </div>
      {(order.status==="완료"||order.status==="투입완료"||order.status==="확정")&&order.detail&&(
        <div style={{marginTop:10,background:"rgba(0,0,0,.2)",borderRadius:8,padding:"12px 14px",fontSize:13}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,padding:"8px 12px",background:"rgba(76,175,80,.12)",borderRadius:8,border:"1px solid #4caf5033",flexWrap:"wrap"}}>
            <span style={{color:"#6fcf97",fontWeight:700,fontSize:14}}>📦 {pName(order.p_code)}</span>
            <span style={{color:"#6fcf97",fontSize:13}}>소비기한</span>
            <span style={{color:"#6fcf97",fontWeight:700,fontSize:16,background:"rgba(76,175,80,.2)",padding:"2px 10px",borderRadius:6}}>{fmtDate(order.detail.finExp)}</span>
            {order.detail.lot&&<span style={{color:"#f5c97a",fontWeight:700,fontSize:15,background:"rgba(200,130,26,.25)",padding:"2px 10px",borderRadius:6}}>LOT {order.detail.lot}</span>}
            {order.detail.hasPending&&<span style={{fontSize:11,color:"#f2c94c",background:"rgba(242,201,76,.15)",border:"1px solid #f2c94c44",borderRadius:4,padding:"2px 7px"}}>⚠️ 입고예정 포함</span>}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {(order.detail.details||[]).map((c,i)=>{
              const exp=c.expiry||null;const isMin=exp&&exp===order.detail.finExp;
              return(<div key={i} style={{background:isMin?"rgba(200,80,80,.18)":"rgba(200,130,26,.14)",border:"1px solid "+(isMin?"#e0606066":"#c8821a33"),borderRadius:8,padding:"7px 12px",fontSize:12,minWidth:180}}>
                <div style={{color:"#f5c97a",fontWeight:700,marginBottom:4}}><span style={{color:"#9a7050",fontSize:11,marginRight:4}}>[{c.sCode}]</span>{sName(c.sCode)}<span style={{color:"#c8a06a",marginLeft:6,fontWeight:400}}>총 {c.total}개</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span style={{color:"#aaa",fontSize:11}}>소비기한</span><span style={{color:isMin?"#e08080":"#8ecf90",fontWeight:700,fontSize:13}}>{fmtDate(exp)}</span>{isMin&&<span style={{fontSize:10,color:"#e08080",background:"rgba(200,80,80,.2)",border:"1px solid #e0606044",borderRadius:4,padding:"1px 5px"}}>기준</span>}</div>
                {(c.used||[]).length>1&&(<div style={{borderTop:"1px solid #c8821a22",paddingTop:4,marginTop:2}}>{(c.used||[]).map((u,j)=>(<div key={j} style={{display:"flex",justifyContent:"space-between",color:"#9a8060",fontSize:11,padding:"1px 0"}}><span>{fmtDate(u.expiry)}</span><span style={{color:"#c8a06a"}}>{u.qty}개</span></div>))}</div>)}
              </div>);
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ══ 메인 앱 ══════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[tab,setTab]=useState("낱개재고");
  const[sMaster,setSMaster]=useState([]);
  const[pMaster,setPMaster]=useState([]);
  const[bomData,setBomData]=useState([]);
  const[stock,setStock]=useState([]);
  const[orders,setOrders]=useState([]);
  const[prodLog,setProdLog]=useState([]);
  const[channels,setChannels]=useState([]);
  const[loading,setLoading]=useState(true);
  const[pwModal,setPwModal]=useState(null);
  const xlsxRef=useRef();const prodXlsxRef=useRef();

  const[sColors,setSColors]=useState(()=>{try{const s=localStorage.getItem("sColors");return s?JSON.parse(s):{};}catch{return{};}});
  const saveColor=(code,color)=>{const next={...sColors,[code]:color};setSColors(next);localStorage.setItem("sColors",JSON.stringify(next));};
  const sColor=code=>sColors[code]||"";

  const[stockForm,setStockForm]=useState({sCode:"",expiry:"",qty:"",isPending:false});
  const[stockFilter,setStockFilter]=useState("ALL");
  const[orderForm,setOrderForm]=useState({pCode:"",qty:"",channelId:""});
  // planDate: 동적 기본값 (항상 today 기준)
  const[planInfo,setPlanInfo]=useState(()=>{try{const s=localStorage.getItem("planInfo");return s?JSON.parse(s):{planDate:today()};}catch{return{planDate:today()};}});
  const[showPlanSetting,setShowPlanSetting]=useState(false);
  const savePlanInfo=info=>{setPlanInfo(info);localStorage.setItem("planInfo",JSON.stringify(info));setShowPlanSetting(false);};
  const[bomPCode,setBomPCode]=useState("");
  const[newComp,setNewComp]=useState({sCode:"",qty:""});
  const[logFilter,setLogFilter]=useState("전체");
  const[logDateMode,setLogDateMode]=useState("all"); // 생산로그 날짜 필터
  const[logDateRange,setLogDateRange]=useState({from:"",to:""});
  const[logSingleDate,setLogSingleDate]=useState("");
  // 완제품 생산 조회: printDate 기준 (5번)
  const[viewDate,setViewDate]=useState(today()); // 조회 날짜
  const[orderTab,setOrderTab]=useState("생산계획"); // 생산계획/생산확정/완료 탭
  const[checkedOrders,setCheckedOrders]=useState(new Set());

  // 설정 — 업체 관련
  const[newChannel,setNewChannel]=useState({name:"",color:COLORS[0],color2:"",active:true});
  const[editChId,setEditChId]=useState(null);
  const[editChData,setEditChData]=useState({name:"",color:"",color2:"",active:true});
  const[newSingle,setNewSingle]=useState({code:"",name:""});
  const[newProduct,setNewProduct]=useState({code:"",name:""});
  // 비밀번호 변경 (13번)
  const[pwChange,setPwChange]=useState({cur:"",next:"",confirm:""});
  const[pwChangeMsg,setPwChangeMsg]=useState(null);

  // ── 인증 (drip2_users) ──
  useEffect(()=>{
    try{const saved=sessionStorage.getItem("drip2_user");if(saved)setUser(JSON.parse(saved));}catch{}
    setAuthLoading(false);
  },[]);
  const handleLogin=u=>{setUser(u);try{sessionStorage.setItem("drip2_user",JSON.stringify(u));}catch{}};
  const logout=()=>{setUser(null);try{sessionStorage.removeItem("drip2_user");}catch{}};
  useEffect(()=>{if(!user)return;loadAll();
    const chs=[
      sb.channel('sm').on('postgres_changes',{event:'*',schema:'public',table:'single_master'},()=>loadMasters()),
      sb.channel('pm').on('postgres_changes',{event:'*',schema:'public',table:'product_master'},()=>loadMasters()),
      sb.channel('bom2').on('postgres_changes',{event:'*',schema:'public',table:'bom'},()=>loadBom()),
      sb.channel('ch').on('postgres_changes',{event:'*',schema:'public',table:'channels'},()=>loadChannels()),
      sb.channel('plog').on('postgres_changes',{event:'INSERT',schema:'public',table:'prod_log'},()=>loadLog()),
    ];
    chs.forEach(c=>c.subscribe());
    return()=>chs.forEach(c=>sb.removeChannel(c));
  },[user]);
  useEffect(()=>{if(channels.length>0&&!orderForm.channelId)setOrderForm(f=>({...f,channelId:String(channels[0].id)}));},[channels]);

  const loadAll=async()=>{setLoading(true);await Promise.all([loadMasters(),loadBom(),loadStock(),loadOrders(),loadLog(),loadChannels()]);setLoading(false);};
  const loadMasters=async()=>{
    const[{data:sm},{data:pm}]=await Promise.all([sb.from("drip2_single_master").select("*").order("code"),sb.from("drip2_product_master").select("*").order("code")]);
    if(sm){setSMaster(sm);setStockForm(f=>({...f,sCode:f.sCode&&sm.find(x=>x.code===f.sCode)?f.sCode:sm[0]?.code||""}));setNewComp(f=>({...f,sCode:f.sCode&&sm.find(x=>x.code===f.sCode)?f.sCode:sm[0]?.code||""}));}
    if(pm){setPMaster(pm);setOrderForm(f=>({...f,pCode:f.pCode&&pm.find(x=>x.code===f.pCode)?f.pCode:pm[0]?.code||""}));setBomPCode(p=>p&&pm.find(x=>x.code===p)?p:pm[0]?.code||"");}
  };
  const loadBom=async()=>{const{data}=await sb.from("drip2_bom").select("*");if(data)setBomData(data);};
  // 낱개재고: 제품별 그룹 → 소비기한 오래된 순 (10번)
  const loadStock=async()=>{const{data}=await sb.from("drip2_stock").select("*");if(data){const sorted=[...data].sort((a,b)=>a.s_code.localeCompare(b.s_code)||new Date(a.expiry)-new Date(b.expiry));setStock(sorted);}};
  const loadOrders=async()=>{const{data}=await sb.from("drip2_orders").select("*").order("priority");if(data)setOrders(data);};
  const loadLog=async()=>{const{data}=await sb.from("drip2_prod_log").select("*").order("created_at",{ascending:false});if(data)setProdLog(data);};
  const loadChannels=async()=>{const{data}=await sb.from("drip2_channels").select("*").order("sort_order").order("name");if(data)setChannels(data);};

  const sName=code=>sMaster.find(s=>s.code===code)?.name||code;
  const pName=code=>pMaster.find(p=>p.code===code)?.name||code;
  const askPw=(title,desc,action)=>setPwModal({title,desc,action});
  const bomOf=pCode=>bomData.filter(b=>b.p_code===pCode);
  // 낱개재고 요약: 제품별 그룹 (10번)
  const stockSummary=sMaster.map(s=>({...s,total:stock.filter(x=>x.s_code===s.code).reduce((a,b)=>a+b.qty,0)}));
  const activeChannels=channels.filter(c=>c.active!==false);

  // ── 낱개재고 ──
  const addStock=async()=>{
    const{sCode,expiry,qty}=stockForm;
    if(!sCode||!expiry||!qty)return alert("모든 항목을 입력해주세요.");
    const raw=expiry.replace(/-/g,"");
    const d=parseDate(raw.length===8?raw:expiry);
    if(!d)return alert("소비기한 형식 오류");
    const expStr=d.toISOString().slice(0,10);
    const{data,error}=await sb.from("drip2_stock").insert({s_code:sCode,expiry:expStr,qty:parseInt(qty),is_pending:stockForm.isPending}).select().single();
    if(error)return alert("저장 오류: "+error.message);
    if(data)setStock(prev=>[...prev,data].sort((a,b)=>a.s_code.localeCompare(b.s_code)||new Date(a.expiry)-new Date(b.expiry)));
    setStockForm(f=>({...f,expiry:"",qty:"",isPending:false}));
  };
  const updateStockQty=async(id,qty)=>{const v=Math.max(0,parseInt(qty)||0);await sb.from("drip2_stock").update({qty:v}).eq("id",id);setStock(prev=>prev.map(s=>s.id===id?{...s,qty:v}:s));};
  const delStock=id=>askPw("낱개 재고 삭제","해당 행이 삭제됩니다.",async()=>{await sb.from("drip2_stock").delete().eq("id",id);setStock(prev=>prev.filter(s=>s.id!==id));});
  const resetStock=()=>askPw("낱개 재고 전체 초기화","모든 재고가 삭제됩니다.",async()=>{await sb.from("drip2_stock").delete().gt("qty",-999999);setStock([]);});

  const downloadExcel=()=>{
    const rows=[["품목코드","품목명","수량","소비기한"]];
    sMaster.forEach(s=>rows.push([s.code,s.name,0,""]));
    const ws=XLSX.utils.aoa_to_sheet(rows);ws["!cols"]=[{wch:15},{wch:30},{wch:10},{wch:15}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"재고입력");
    XLSX.writeFile(wb,"낱개재고_양식.xlsx");
  };
  const handleExcel=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    try{

  // ── 투입 ──
  const investCore=async(orderId,stockSnap)=>{
    const order=orders.find(o=>o.id===orderId);if(!order)return null;
    const recipe=bomOf(order.p_code);
    if(!recipe.length){alert("BOM이 설정되지 않은 제품입니다.");return null;}
    const baseStock=stockSnap||stock;
    findUnifiedExpiry(baseStock,recipe,order.qty);
    let ws=[...baseStock];const details=[],errors=[];
    for(const comp of recipe){
      const need=comp.qty*order.qty;
      const{ok,used,next,shortage}=smartDeduct(ws,comp.s_code,need);
      if(!ok)errors.push("["+sName(comp.s_code)+"] "+shortage+"개 부족");
      else{ws=next;details.push({sCode:comp.s_code,used,total:need});}
    }
    if(errors.length){alert("⚠️ 생산 불가\n\n"+errors.join("\n"));return null;}
    const detailsWithExp=details.map(d=>({...d,expiry:(d.used&&d.used.length>0)?d.used.reduce((min,u)=>new Date(u.expiry)<new Date(min)?u.expiry:min,d.used[0].expiry):null}));
    const allExpArr=detailsWithExp.map(d=>d.expiry).filter(Boolean);
    const finExp=allExpArr.length>0?allExpArr.reduce((min,e)=>new Date(e)<new Date(min)?e:min):null;
    const mixed=detailsWithExp.filter(d=>(d.used||[]).length>1);
    if(mixed.length>0){
      const msg=mixed.map(d=>"["+sName(d.sCode)+"]\n"+d.used.map(u=>"  "+fmtDate(u.expiry)+" "+u.qty+"개").join("\n")).join("\n\n");

    }
    const hasPendingFlag=details.some(d=>(d.used||[]).some(u=>stock.find(s=>s.id===u.id)?.is_pending));
    for(const row of ws){const orig=baseStock.find(s=>s.id===row.id);if(orig&&orig.qty!==row.qty)await sb.from("drip2_stock").update({qty:row.qty}).eq("id",row.id);}
    const lot=await assignLot(finExp,detailsWithExp,order.p_code);
    const lotKey=makeLotKey(detailsWithExp);
    const workerId=user?.user_id||user?.email||"unknown";
    // 로그 먼저 생성
    const{data:logData,error:logError}=await sb.from("drip2_prod_log").insert({
      order_id:orderId,
      p_code:order.p_code,
      channel:order.channel,
      qty:order.qty,
      fin_exp:finExp,
      details:detailsWithExp,
      lot,
      lot_key:lotKey,
      worker_id:workerId
    }).select().single();
    if(logError){
      console.error("로그 저장 오류:",logError.message);
      alert("⚠️ 로그 저장 오류: "+logError.message+"\n\n투입은 완료됐습니다. Supabase prod_log 컬럼을 확인해주세요.");
    }
    // logId 포함해서 단 한 번만 저장
    const detailWithLog={details:detailsWithExp,finExp,hasPending:hasPendingFlag,lot,lotKey,logId:logData?.id||null};
    await sb.from("drip2_orders").update({status:"투입완료",detail:detailWithLog,plan_date:order.plan_date||null}).eq("id",orderId);
    setStock(ws);
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,status:"투입완료",detail:detailWithLog,plan_date:order.plan_date}:o));

      setProdLog(prev=>[logData,...prev]);
    } else {
      await loadLog();
    }
    return ws;
  };

  const delChannel=id=>{const ch=channels.find(c=>c.id===id);askPw("업체 삭제","["+ch?.name+"] 삭제됩니다.",async()=>{await sb.from("drip2_channels").delete().eq("id",id);setChannels(prev=>prev.filter(c=>c.id!==id));});};
  const startEditCh=ch=>{setEditChId(ch.id);setEditChData({name:ch.name,color:ch.color||COLORS[0],color2:ch.color2||"",active:ch.active!==false});};
  const saveEditCh=async()=>{
    if(!editChData.name.trim())return alert("업체명을 입력하세요.");
    await sb.from("drip2_channels").update({name:editChData.name.trim(),color:editChData.color,color2:editChData.color2||null,active:editChData.active}).eq("id",editChId);
    setChannels(prev=>prev.map(c=>c.id===editChId?{...c,...editChData,name:editChData.name.trim()}:c));
    setEditChId(null);
  };
  const toggleChActive=async(id,active)=>{await sb.from("drip2_channels").update({active}).eq("id",id);setChannels(prev=>prev.map(c=>c.id===id?{...c,active}:c));};

  // ── 비밀번호 변경 (13번) ──
  const changePw=async()=>{
    const{cur,next,confirm}=pwChange;
    if(!cur||!next||!confirm)return setPwChangeMsg({type:"err",msg:"모든 항목을 입력하세요."});
    if(next.length<4)return setPwChangeMsg({type:"err",msg:"새 비밀번호는 4자 이상이어야 합니다."});
    if(next!==confirm)return setPwChangeMsg({type:"err",msg:"새 비밀번호가 일치하지 않습니다."});
    // 현재 비밀번호 확인
    const{data,error}=await sb.from("drip2_users").select("id").eq("user_id",user.user_id).eq("password",cur).maybeSingle();
    if(error||!data)return setPwChangeMsg({type:"err",msg:"현재 비밀번호가 틀렸습니다."});
    const{error:upErr}=await sb.from("drip2_users").update({password:next}).eq("user_id",user.user_id);
    if(upErr)return setPwChangeMsg({type:"err",msg:"변경 오류: "+upErr.message});
    setPwChange({cur:"",next:"",confirm:""});
    setPwChangeMsg({type:"ok",msg:"✅ 비밀번호가 변경되었습니다."});
  };

  // ── 조회 날짜 기준 필터 ──
  // 생산계획: priority 오름차순(먼저 등록한게 위, 새 등록은 아래)
  const sortedOrders=[...orders].sort((a,b)=>a.priority-b.priority);
  const viewOrders=sortedOrders.filter(o=>{
    if(!viewDate)return true;
    return (o.plan_date||"")=== viewDate;
  });

  // ── 생산로그 날짜 필터 (11번) ──
  const filteredLog=prodLog.filter(log=>{
    if(logFilter!=="전체"&&log.p_code!==logFilter)return false;
    const d=(log.created_at||"").slice(0,10);
    if(logDateMode==="single")return d===logSingleDate;
    if(logDateMode==="range"){
      if(logDateRange.from&&d<logDateRange.from)return false;
      if(logDateRange.to&&d>logDateRange.to)return false;
    }
    return true;
  });

  // ── 생산계획서 출력 ──
  const printPlan=(filterDate)=>{
    const pending=viewOrders.filter(o=>o.status==="대기"||o.status==="투입완료");
    if(!pending.length){alert("출력할 주문이 없습니다.");return;}
    const rows=pending.map(o=>{
      const lotStr=o.detail?.lot?"LOT "+o.detail.lot:"(투입 전)";
      const finExpStr=o.detail?.finExp?fmtDate(o.detail.finExp):"-";
      const ch=channels.find(c=>c.name===o.channel);
      const chColor=ch?.color||"#5a6a5a";
      const chColor2=ch?.color2||null;
      const companyDisplay=o.channel||"-";
      const details=(o.detail?.details||[]).map(d=>"<tr><td style='padding:4px 10px;border:1px solid #ccc;'>"+d.sCode+"</td><td style='padding:4px 10px;border:1px solid #ccc;'>"+sName(d.sCode)+"</td><td style='padding:4px 10px;border:1px solid #ccc;text-align:center;'>"+d.total+"개</td><td style='padding:4px 10px;border:1px solid #ccc;text-align:center;'>"+fmtDate(d.expiry)+"</td></tr>").join("");
      const detailTable=o.detail?.details?.length>0?"<table style='width:100%;border-collapse:collapse;margin-top:6px;font-size:12px;'><tr style='background:#f0f0f0;'><th style='padding:4px 10px;border:1px solid #ccc;'>코드</th><th style='padding:4px 10px;border:1px solid #ccc;'>낱개명</th><th style='padding:4px 10px;border:1px solid #ccc;'>수량</th><th style='padding:4px 10px;border:1px solid #ccc;'>소비기한</th></tr>"+details+"</table>":"";
      // 반반 색상 뱃지 (8번, 9번 — 인쇄용 크게)
      const badgeBg=chColor2
        ?"linear-gradient(90deg,"+chColor+" 50%,"+chColor2+" 50%)"
        :chColor;
      const chBadge="<span style='display:inline-block;background:"+badgeBg+";color:#fff;border:3px solid rgba(255,255,255,.8);border-radius:8px;padding:6px 22px;font-weight:700;font-size:17px;-webkit-print-color-adjust:exact;print-color-adjust:exact;text-shadow:0 1px 3px rgba(0,0,0,.6);letter-spacing:.5px;'>"+companyDisplay+"</span>";
      return "<div style='border:2px solid #ccc;border-radius:8px;padding:14px 18px;margin-bottom:16px;page-break-inside:avoid;'>"
        +"<div style='display:flex;align-items:center;gap:12px;background:#f5f5f5;border-radius:6px;padding:10px 14px;margin-bottom:10px;border:1px solid #ddd;'>"+chBadge
        +"<span style='background:#5a7a3a;color:#fff;border-radius:5px;padding:4px 12px;font-weight:700;font-size:14px;'>📅 "+(o.plan_date||"-")+"</span>"
        +"</div>"
        +"<div style='display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;'>"
        +"<span style='background:#5a7a4a;color:#fff;border-radius:5px;padding:2px 8px;font-weight:700;font-size:12px;'>P"+o.priority+"</span>"
        +"<span style='font-size:11px;color:#888;'>["+o.p_code+"]</span>"
        +"<span style='font-weight:700;font-size:15px;'>"+pName(o.p_code)+"</span>"
        +"<span style='font-weight:700;font-size:14px;'>생산수량: <b>"+o.qty+"개</b></span>"
        +"<span style='color:#155a15;font-weight:700;'>"+lotStr+"</span>"
        +"<span>소비기한: <b style='color:#8a2000;'>"+finExpStr+"</b></span>"
        +"</div>"+detailTable+"</div>";
    }).join("");
    const todayStr=new Date().toLocaleDateString("ko-KR");
    const html="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>생산계획서</title>"
      +"<style>body{font-family:'Noto Sans KR',sans-serif;padding:30px;color:#222;}"
      +"@media print{@page{margin:15mm;}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}}</style>"
      +"</head><body>"
      +"<div style='display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;border-bottom:2px solid #333;padding-bottom:10px;'>"
      +"<div><h2 style='margin:0;'>드립백 생산계획서</h2><div style='color:#666;font-size:13px;'>"+(filterDate?filterDate+" · ":"")+pending.length+"건</div></div>"
      +"<div style='text-align:right;font-size:13px;color:#666;'><div>생산일: <b>"+(planInfo.planDate||todayStr)+"</b></div><div>출력일: "+todayStr+"</div></div>"
      +"</div>"+rows
      +"<div style='margin-top:30px;border-top:1px solid #ccc;padding-top:16px;display:flex;gap:40px;font-size:13px;color:#555;'>"
      +"<span>확인: ___________</span><span>담당: ___________</span><span>팀장: ___________</span>"
      +"</div></body></html>";
    const iframe=document.createElement("iframe");
    iframe.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:99999;background:#fff;";
    document.body.appendChild(iframe);
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
    setTimeout(()=>{iframe.contentWindow.print();setTimeout(()=>document.body.removeChild(iframe),1000);},500);
  };

  // ── 스타일 ──
  const inp={background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",borderRadius:6,color:"#f0e6d3",padding:"6px 10px",fontSize:13,outline:"none",width:130,fontFamily:"inherit"};
  const sel={...inp,cursor:"pointer",width:"auto"};
