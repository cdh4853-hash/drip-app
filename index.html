  const primaryBtn={border:"none",borderRadius:8,padding:"8px 20px",fontSize:14,cursor:"pointer",background:"linear-gradient(135deg,#5a7a4a,#7a9a6a)",color:"#fff",fontWeight:700,fontFamily:"inherit"};
  const delBtn={background:"rgba(160,60,60,.25)",border:"1px solid #c0606044",color:"#e89090",borderRadius:6,padding:"4px 10px",fontSize:13,cursor:"pointer",fontFamily:"inherit"};
  const SecTitle=({icon,title})=>(<div style={{display:"flex",alignItems:"center",gap:8,fontSize:16,fontWeight:700,color:"#f5c97a",marginBottom:14,borderLeft:"3px solid #c8821a",paddingLeft:12}}>{icon} {title}</div>);
  const Tbl=({headers,children})=>(<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",background:"rgba(255,255,255,.03)",border:"1px solid #c8821a33",fontSize:14}}><thead><tr style={{background:"rgba(200,130,26,.18)"}}>{headers.map(h=><th key={h} style={{padding:"9px 14px",textAlign:"left",color:"#c8ddb8",fontWeight:600,fontSize:13,borderBottom:"1px solid #6a8a5a55"}}>{h}</th>)}</tr></thead><tbody>{children}</tbody></table></div>);
  const Td=({children,style})=><td style={{padding:"8px 14px",borderBottom:"1px solid #6a6a6444",verticalAlign:"middle",...style}}>{children}</td>;

  if(authLoading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,color:"#a8b8a0"}}><div style={{fontSize:40}}>☕</div><div>인증 확인 중...</div></div>);
  if(!user)return <LoginScreen onLogin={handleLogin}/>;
  if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,color:"#a8b8a0"}}><div style={{fontSize:40}}>☕</div><div>데이터 불러오는 중...</div></div>);

  const PlanSettingModal=()=>{
    const[tmp,setTmp]=useState({...planInfo});
    return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{background:"#2e2e2c",border:"2px solid #6a8a5a",borderRadius:16,padding:"28px 32px",minWidth:300}}>
        <div style={{color:"#d8ecca",fontWeight:700,fontSize:16,marginBottom:18}}>📅 생산 날짜 설정</div>
        <div style={{marginBottom:20}}><div style={{fontSize:12,color:"#a8b8a0",marginBottom:4}}>생산날짜</div>
          <input type="date" value={tmp.planDate} onChange={e=>setTmp(t=>({...t,planDate:e.target.value}))}
            style={{width:"100%",padding:"8px 12px",borderRadius:8,fontSize:14,background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",color:"#f0ede8",outline:"none",fontFamily:"inherit"}}/></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowPlanSetting(false)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:"rgba(255,255,255,.07)",color:"#c8c8b8",cursor:"pointer",fontFamily:"inherit"}}>취소</button>
          <button onClick={()=>savePlanInfo(tmp)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#5a7a4a,#7a9a6a)",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>저장</button>
        </div>
      </div>
    </div>);
  };

  // 색상 팔레트 컴포넌트 (재사용)
  const ColorPicker=({label,value,onChange})=>(
    <div>
      <div style={lbl}>{label} {value&&<span style={{background:value,padding:"1px 8px",borderRadius:4,fontSize:11,border:"1px solid rgba(255,255,255,.3)"}}>{value}</span>}</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",maxWidth:230}}>
        {COLORS.map(col=>(
          <div key={col} onClick={()=>onChange(col)} style={{width:24,height:24,borderRadius:5,cursor:"pointer",background:col,border:value===col?"3px solid #fff":"2px solid transparent",outline:value===col?"2px solid #c8821a":"none",boxSizing:"border-box"}}/>
        ))}
        <div onClick={()=>onChange("")} style={{width:24,height:24,borderRadius:5,cursor:"pointer",background:"transparent",border:!value?"3px solid #fff":"2px solid #6a6a64",backgroundImage:"repeating-linear-gradient(45deg,#888 0,#888 2px,transparent 2px,transparent 6px)",boxSizing:"border-box"}} title="없음"/>
      </div>
    </div>
  );

  // ──────────────────────────────────────

  return(
    <div style={{minHeight:"100vh"}}>
      {showPlanSetting&&<PlanSettingModal/>}
      {pwModal&&<PwModal title={pwModal.title} desc={pwModal.desc} onConfirm={()=>{pwModal.action();setPwModal(null);}} onClose={()=>setPwModal(null)}/>}

      {/* 헤더 */}
      <div style={{background:"linear-gradient(90deg,#2c2c2a,#484844,#2c2c2a)",borderBottom:"2px solid #7a9a6a",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 4px 18px rgba(0,0,0,.35)",flexWrap:"wrap"}}>
        <span style={{fontSize:24}}>☕</span>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:"#e8f0e0",letterSpacing:1}}>드립백 생산 관리 시스템</div>
          <div style={{fontSize:11,color:"#6fcf97"}}>🟢 실시간 연동 · FIFO · BOM</div>
        </div>
        <KstClock/>
        <div style={{marginLeft:"auto",display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          {["낱개재고","완제품생산","BOM관리","제품마스터","생산로그","설정"].map(t=>(
            <button key={t} onClick={()=>{setTab(t);if(t==="생산로그")loadLog();}} style={{padding:"5px 13px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,background:tab===t?"#6a8a5a":"rgba(255,255,255,.1)",color:tab===t?"#fff":"#c8c8b8",fontWeight:tab===t?700:400}}>{t}</button>
          ))}
          <div style={{marginLeft:6,display:"flex",alignItems:"center",gap:8,padding:"3px 10px",background:"rgba(255,255,255,.07)",borderRadius:20,border:"1px solid #6a8a5a44"}}>
            <span style={{fontSize:11,color:"#a8b8a0"}}>👤 {user.user_id}</span>
            <button onClick={logout} style={{background:"rgba(200,80,80,.25)",border:"1px solid #c0606044",color:"#e89090",borderRadius:6,padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>로그아웃</button>
          </div>
        </div>
      </div>

      <div style={{padding:"18px 20px",maxWidth:1300,margin:"0 auto"}}>

        {/* ════ 낱개재고 ════ */}
        {tab==="낱개재고"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <SecTitle icon="📦" title="낱개 재고 현황"/>
              <div style={{display:"flex",gap:8}}>
                <input ref={xlsxRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleExcel} style={{display:"none"}}/>
                <button onClick={()=>xlsxRef.current.click()} style={{background:"#1a4020",color:"#6fcf97",border:"1px solid #4caf5055",borderRadius:8,padding:"7px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📊 엑셀 업로드</button>
                <button onClick={resetStock} style={{border:"1px solid #c0606044",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer",background:"rgba(160,60,60,.2)",color:"#e89090",fontFamily:"inherit"}}>🗑 전체 리셋</button>
              </div>
            </div>
            <div style={{background:"rgba(76,175,80,.1)",border:"1px solid #4caf5033",borderRadius:8,padding:"7px 13px",fontSize:12,color:"#8ecf90",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <span>📋 엑셀: <b>A열 품목코드</b> | <b>C열 수량</b> | <b>D열 소비기한(YYYYMMDD)</b></span>
              <button onClick={downloadExcel} style={{background:"#1a4020",border:"1px solid #4caf5055",borderRadius:6,color:"#6fcf97",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>⬇ 양식 다운로드</button>
            </div>
            <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
              <div style={{minWidth:180,maxWidth:220}}>
                <div style={{fontSize:12,color:"#c8a06a",marginBottom:8}}>제품 필터</div>
                <div onClick={()=>setStockFilter("ALL")} style={{padding:"6px 12px",borderRadius:7,cursor:"pointer",marginBottom:4,background:stockFilter==="ALL"?"rgba(200,130,26,.28)":"rgba(255,255,255,.05)",border:"1px solid "+(stockFilter==="ALL"?"#c8821a":"#c8821a22"),color:stockFilter==="ALL"?"#f5c97a":"#c8a06a",fontSize:13}}>전체</div>
                {stockSummary.map(s=>{const c=sColor(s.code);return(
                  <div key={s.code} onClick={()=>setStockFilter(s.code)} style={{padding:"6px 12px",borderRadius:7,cursor:"pointer",marginBottom:4,background:stockFilter===s.code?"rgba(200,130,26,.28)":"rgba(255,255,255,.05)",border:"1px solid "+(stockFilter===s.code?"#c8821a":"#c8821a22"),color:stockFilter===s.code?"#f5c97a":"#c8a06a",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>{c&&<div style={{width:8,height:8,borderRadius:"50%",background:c}}/>}<span>[{s.code}] {s.name}</span></div>
                    <span style={{color:s.total===0?"#e07070":"#e0c090",fontSize:13,fontWeight:700}}>{s.total}</span>
                  </div>
                );})}
              </div>
              <div style={{flex:1}}>
                <Tbl headers={["제품코드","제품명","수량","소비기한","삭제"]}>
                  {stock.filter(s=>stockFilter==="ALL"||s.s_code===stockFilter).map(s=>{const c=sColor(s.s_code);return(
                    <tr key={s.id}>
                      <Td><div style={{display:"flex",alignItems:"center",gap:5}}>{c&&<div style={{width:10,height:10,borderRadius:"50%",background:c}}/>}<span style={{color:"#c8821a",fontWeight:700,fontSize:13}}>{s.s_code}</span></div>{s.is_pending&&<span style={{fontSize:10,color:"#f2c94c",background:"rgba(242,201,76,.15)",border:"1px solid #f2c94c44",borderRadius:4,padding:"1px 5px"}}>입고예정</span>}</Td>
                      <Td><span style={{color:c||"#f5c97a",fontWeight:600}}>{sName(s.s_code)}</span></Td>
                      <Td><StockQtyInput id={s.id} initQty={s.qty} onSave={updateStockQty}/></Td>
                      <Td style={{color:"#e0c090"}}>{fmtDate(s.expiry)}</Td>
                      <Td><button onClick={()=>delStock(s.id)} style={delBtn}>✕</button></Td>
                    </tr>
                  );})}
                </Tbl>
              </div>
            </div>
            <div style={{marginTop:24}}>
              <SecTitle icon="➕" title="낱개 재고 직접 추가"/>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div><div style={lbl}>제품 선택</div><select value={stockForm.sCode} onChange={e=>setStockForm(f=>({...f,sCode:e.target.value}))} style={sel}>{sMaster.map(s=><option key={s.code} value={s.code}>[{s.code}] {s.name}</option>)}</select></div>
                <div><div style={lbl}>소비기한</div><input type="date" value={stockForm.expiry} onChange={e=>setStockForm(f=>({...f,expiry:e.target.value}))} style={{...inp,width:160}}/></div>
                <LblInp label="수량" type="number" value={stockForm.qty} onChange={v=>setStockForm(f=>({...f,qty:v}))} placeholder="0" width={90}/>
                <div style={{alignSelf:"flex-end",display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:"rgba(242,201,76,.08)",border:"1px solid #f2c94c44",borderRadius:8,cursor:"pointer"}} onClick={()=>setStockForm(f=>({...f,isPending:!f.isPending}))}>
                  <div style={{width:16,height:16,borderRadius:4,border:"2px solid #f2c94c",background:stockForm.isPending?"#f2c94c":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{stockForm.isPending&&<span style={{color:"#1a1a1a",fontSize:11,fontWeight:700}}>✓</span>}</div>
                  <span style={{color:"#f2c94c",fontSize:13}}>입고예정</span>
                </div>
                <button onClick={addStock} style={{...primaryBtn,alignSelf:"flex-end"}}>+ 추가</button>
              </div>
            </div>
          </div>
        )}

        {/* ════ 완제품 생산 ════ */}
        {tab==="완제품생산"&&(
          <div>
            {/* 상단 헤더 */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <SecTitle icon="🏭" title="완제품 생산 주문"/>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <div style={{background:"rgba(200,130,26,.13)",border:"1px solid #c8821a44",borderRadius:20,padding:"4px 12px",fontSize:12}}>
                  <span style={{color:"#c8a06a"}}>조회: </span><span style={{color:"#f2c94c",fontWeight:700}}>{viewOrders.length}건</span>
                </div>
                <button onClick={investAll} style={{...primaryBtn,fontSize:13,padding:"6px 14px"}}>⚡ 전체 투입</button>
                <button onClick={downloadProdExcel} style={{background:"#1a3a20",color:"#6fcf97",border:"1px solid #4caf5055",borderRadius:8,padding:"7px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>⬇ 엑셀 양식</button>
                <button onClick={()=>prodXlsxRef.current.click()} style={{background:"#1a3050",color:"#78b8f0",border:"1px solid #4a8ab055",borderRadius:8,padding:"7px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>📊 엑셀 업로드</button>
                <input ref={prodXlsxRef} type="file" accept=".xlsx,.xls" onChange={handleProdExcel} style={{display:"none"}}/>
              </div>
            </div>

            {/* 5번: 조회 날짜 선택 + 출력 */}
            <div style={{background:"rgba(255,255,255,.05)",border:"1px solid #7a8a7044",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{color:"#c8ddb8",fontWeight:700,fontSize:13}}>📅 조회 날짜</span>
              {[["yesterday","어제"],["today","오늘"],["tomorrow","내일"]].map(([k,label])=>(
                <button key={k} onClick={()=>setViewDate(k==="yesterday"?addDays(today(),-1):k==="today"?today():addDays(today(),1))}
                  style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,
                    background:viewDate===(k==="yesterday"?addDays(today(),-1):k==="today"?today():addDays(today(),1))?"#6a8a5a":"rgba(255,255,255,.1)",
                    color:viewDate===(k==="yesterday"?addDays(today(),-1):k==="today"?today():addDays(today(),1))?"#fff":"#c8c8b8",fontWeight:700}}>{label}</button>
              ))}
              <input type="date" value={viewDate} onChange={e=>setViewDate(e.target.value)} style={{...inp,width:150}}/>
              <span style={{fontSize:12,color:"#8a9a88"}}>{viewOrders.length}건</span>
              <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>printPlan(viewDate)} style={{background:"linear-gradient(135deg,#3a6a8a,#5a8aaa)",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,cursor:"pointer",color:"#fff",fontWeight:700,fontFamily:"inherit"}}>🖨 생산계획서 출력</button>
              </div>
            </div>

            {/* 주문 등록 폼 */}
            <div style={{background:"rgba(255,255,255,.06)",border:"1px solid #7a8a7044",borderRadius:12,padding:"16px 18px",marginBottom:20}}>
              <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div>
                  <div style={lbl}>생산 날짜</div>
                  <input type="date" value={viewDate} onChange={e=>setViewDate(e.target.value)}
                    style={{...inp,width:160,border:"1px solid #c8821a66",background:"rgba(200,130,26,.12)"}}/>
                </div>
                <div><div style={lbl}>완제품 선택</div><select value={orderForm.pCode} onChange={e=>setOrderForm(f=>({...f,pCode:e.target.value}))} style={sel}>{pMaster.map(p=><option key={p.code} value={p.code}>[{p.code}] {p.name}</option>)}</select></div>
                <div><div style={lbl}>출고 업체</div>
                  <select value={orderForm.channelId} onChange={e=>setOrderForm(f=>({...f,channelId:e.target.value}))} style={sel}>
                    {activeChannels.map(c=><option key={c.id} value={String(c.id)}>{c.name}</option>)}
                    {activeChannels.length===0&&<option value="">업체 없음 (설정탭에서 추가)</option>}
                  </select>
                </div>
                {orderForm.channelId&&(()=>{const ch=channels.find(c=>String(c.id)===String(orderForm.channelId));return ch?<div style={{alignSelf:"flex-end",paddingBottom:2}}><ChannelBadge name={ch.name} color={ch.color} color2={ch.color2} size="sm"/></div>:null;})()}
                <LblInp label="생산수량" type="number" value={orderForm.qty} onChange={v=>setOrderForm(f=>({...f,qty:v}))} placeholder="0" width={90}/>
                <button onClick={addOrder} style={{...primaryBtn,alignSelf:"flex-end"}}>주문 등록</button>
              </div>
            </div>

            {/* 다중 선택 */}
            {/* 3단계 탭 */}
            <div style={{display:"flex",gap:0,marginBottom:14,borderBottom:"2px solid #6a8a5a33"}}>
              {[
                ["생산계획", viewOrders.filter(o=>o.status==="대기"||o.status==="투입완료").length, "#f2c94c"],
                ["생산확정", viewOrders.filter(o=>o.status==="확정").length, "#f5c97a"],
                ["완료",     viewOrders.filter(o=>o.status==="완료").length, "#6fcf97"],
              ].map(([t,cnt,color])=>(
                <button key={t} onClick={()=>{setOrderTab(t);setCheckedOrders(new Set());}}
                  style={{background:"none",border:"none",padding:"8px 22px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
                    color:orderTab===t?"#d8ecca":"#8a9a88",
                    borderBottom:orderTab===t?"2px solid "+color:"2px solid transparent",marginBottom:-2}}>
                  {t}
                  <span style={{marginLeft:6,fontSize:12,color:orderTab===t?color:"#707870"}}>{cnt}건</span>
                </button>
              ))}
            </div>

            {/* 생산계획 — 다중 선택 */}
            {orderTab==="생산계획"&&viewOrders.filter(o=>o.status==="대기"||o.status==="투입완료").length>0&&(
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,padding:"8px 14px",background:"rgba(255,255,255,.05)",border:"1px solid #7a8a7044",borderRadius:8,flexWrap:"wrap"}}>
                <span style={{color:"#a8b8a0",fontSize:13,fontWeight:700}}>다중 선택:</span>
                <button onClick={()=>checkAll(viewOrders.filter(o=>o.status==="대기"||o.status==="투입완료").map(o=>o.id))} style={{background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",borderRadius:6,color:"#d8ecca",padding:"4px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>☑ 전체</button>
                <button onClick={()=>checkAll(viewOrders.filter(o=>o.status==="투입완료").map(o=>o.id))} style={{background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",borderRadius:6,color:"#8ac8f0",padding:"4px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>☑ 투입완료만</button>
                <button onClick={uncheckAll} style={{background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",borderRadius:6,color:"#d8ecca",padding:"4px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>☐ 해제</button>
                <button onClick={async()=>{
                  if(!checkedOrders.size)return alert("투입완료된 항목을 선택하세요.");
                  const ids=[...checkedOrders].filter(id=>orders.find(o=>o.id===id)?.status==="투입완료");
                  if(!ids.length)return alert("투입완료 상태 항목만 확정할 수 있습니다.");
                  for(const id of ids)await sb.from("drip2_orders").update({status:"확정"}).eq("id",id);
                  setOrders(prev=>prev.map(o=>ids.includes(o.id)?{...o,status:"확정"}:o));
                  setCheckedOrders(new Set());
                }} style={{background:"linear-gradient(135deg,#7a6020,#b08a30)",border:"1px solid #c8a06a66",borderRadius:6,color:"#f5e8a0",padding:"4px 16px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>📋 선택 생산확정 {checkedOrders.size>0?"("+checkedOrders.size+"건)":""}</button>
                <button onClick={()=>{
                  if(!checkedOrders.size)return alert("삭제할 항목을 선택하세요.");
                  askPw("선택 주문 삭제","선택된 "+checkedOrders.size+"건을 삭제합니다. 투입완료 항목은 재고가 복구됩니다.",async()=>{
                    const ids=[...checkedOrders];
                    for(const id of ids){
                      const order=orders.find(o=>o.id===id);
                      if(!order)continue;
                      if(order.status==="투입완료"&&order.detail?.details){
                        for(const d of order.detail.details)for(const u of (d.used||[])){
                          const cur=stock.find(s=>s.id===u.id);
                          if(cur){const restored=cur.qty+u.qty;await sb.from("drip2_stock").update({qty:restored}).eq("id",u.id);setStock(prev=>prev.map(s=>s.id===u.id?{...s,qty:restored}:s));}
                        }
                        // logId 기준 로그 삭제
                        const logId=order.detail?.logId;
                        if(logId){await sb.from("drip2_prod_log").delete().eq("id",logId);setProdLog(prev=>prev.filter(l=>l.id!==logId));}
                      }
                      await sb.from("drip2_orders").delete().eq("id",id);
                    }
                    setOrders(prev=>prev.filter(o=>!ids.includes(o.id)));
                    setCheckedOrders(new Set());
                  });
                }} style={{background:"rgba(160,60,60,.3)",border:"1px solid #c0606055",borderRadius:6,color:"#f08080",padding:"4px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>🗑 선택 삭제 {checkedOrders.size>0?"("+checkedOrders.size+"건)":""}</button>
              </div>
            )}

            {/* 생산확정 — 다중 선택 */}
            {orderTab==="생산확정"&&viewOrders.filter(o=>o.status==="확정").length>0&&(
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,padding:"8px 14px",background:"rgba(255,255,255,.05)",border:"1px solid #7a8a7044",borderRadius:8,flexWrap:"wrap"}}>
                <span style={{color:"#a8b8a0",fontSize:13,fontWeight:700}}>다중 선택:</span>
                <button onClick={()=>checkAll(viewOrders.filter(o=>o.status==="확정").map(o=>o.id))} style={{background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",borderRadius:6,color:"#d8ecca",padding:"4px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>☑ 전체</button>
                <button onClick={uncheckAll} style={{background:"rgba(255,255,255,.1)",border:"1px solid #7a8a7055",borderRadius:6,color:"#d8ecca",padding:"4px 12px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>☐ 해제</button>
                <button onClick={async()=>{
                  if(!checkedOrders.size)return alert("항목을 선택하세요.");
                  const ids=[...checkedOrders];
                  for(const id of ids)await sb.from("drip2_orders").update({status:"완료"}).eq("id",id);
                  setOrders(prev=>prev.map(o=>ids.includes(o.id)?{...o,status:"완료"}:o));
                  setCheckedOrders(new Set());
                }} style={{background:"linear-gradient(135deg,#2d6a2d,#3a8a3a)",border:"1px solid #4caf5066",borderRadius:6,color:"#6fcf97",padding:"4px 16px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✅ 선택 완료 {checkedOrders.size>0?"("+checkedOrders.size+"건)":""}</button>
                <button onClick={()=>{
                  if(!checkedOrders.size)return alert("복귀할 항목을 선택하세요.");
                  askPw("선택 생산계획 복귀","선택된 "+checkedOrders.size+"건의 재고가 복구되고 생산계획으로 돌아갑니다.",async()=>{
                    const ids=[...checkedOrders].map(String);
                    // 재고 복구: 모든 주문의 used를 먼저 누적한 뒤 한 번에 처리
                    const stockDelta={};
                    for(const id of ids){
                      const order=orders.find(o=>String(o.id)===id);
                      if(!order)continue;
                      if(order.detail?.details){
                        for(const d of order.detail.details)for(const u of (d.used||[])){
                          stockDelta[u.id]=(stockDelta[u.id]||0)+u.qty;
                        }
                      }
                    }
                    // stock 누적 복구 적용
                    const updatedStock=[...stock];
                    for(const [sid,delta] of Object.entries(stockDelta)){
                      const idx=updatedStock.findIndex(s=>String(s.id)===sid);
                      if(idx!==-1){
                        const restored=updatedStock[idx].qty+delta;
                        updatedStock[idx]={...updatedStock[idx],qty:restored};
                        await sb.from("drip2_stock").update({qty:restored}).eq("id",sid);
                      }
                    }
                    setStock(updatedStock);
                    // 로그 및 주문 상태 업데이트 (logId 기준)
                    for(const id of ids){
                      const order=orders.find(o=>String(o.id)===id);
                      const logId=order?.detail?.logId;
                      if(logId){await sb.from("drip2_prod_log").delete().eq("id",logId);}
                      await sb.from("drip2_orders").update({status:"대기",detail:null}).eq("id",id);
                    }
                    setProdLog(prev=>{
                      const deletedLogIds=new Set(ids.map(id=>orders.find(o=>String(o.id)===id)?.detail?.logId).filter(Boolean));
                      return prev.filter(l=>!deletedLogIds.has(l.id));
                    });
                    setOrders(prev=>prev.map(o=>ids.includes(String(o.id))?{...o,status:"대기",detail:null}:o));
                    setCheckedOrders(new Set());
                    setOrderTab("생산계획");
                  });
                }} style={{background:"rgba(90,130,200,.25)",border:"1px solid #5a8fc055",borderRadius:6,color:"#8ac8d8",padding:"4px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>🔄 선택 복귀 {checkedOrders.size>0?"("+checkedOrders.size+"건)":""}</button>
              </div>
            )}

            {/* 생산계획 목록 */}
            {orderTab==="생산계획"&&(
              viewOrders.filter(o=>o.status==="대기"||o.status==="투입완료").length===0
                ?<div style={{textAlign:"center",color:"#909888",padding:26,fontSize:14}}>생산계획 주문이 없습니다.</div>
                :viewOrders.filter(o=>o.status==="대기"||o.status==="투입완료").map((order,idx,arr)=>(
                  <div key={order.id} style={{display:"flex",alignItems:"flex-start",gap:8}}>
                    <div style={{paddingTop:15,flexShrink:0}}><input type="checkbox" checked={checkedOrders.has(order.id)} onChange={()=>toggleCheck(order.id)} style={{width:18,height:18,cursor:"pointer",accentColor:"#7aaf6a"}}/></div>
                    <div style={{flex:1}}>
                      <OrderCard order={order} pName={pName} sName={sName} fmtDate={fmtDate}
                        invest={invest} delOrder={delOrder} updateOrder={updateOrder}
                        confirmOrder={confirmOrder} completeOrder={completeOrder} revertOrder={revertOrder} cancelOrder={cancelOrder}
                        primaryBtn={primaryBtn} delBtn={delBtn}
                        moveOrder={moveOrder} isFirst={idx===0} isLast={idx===arr.length-1}
                        channels={channels}/>
                    </div>
                  </div>
                ))
            )}

            {/* 생산확정 목록 */}
            {orderTab==="생산확정"&&(
              viewOrders.filter(o=>o.status==="확정").length===0
                ?<div style={{textAlign:"center",color:"#909888",padding:26,fontSize:14}}>생산확정 주문이 없습니다.</div>
                :viewOrders.filter(o=>o.status==="확정").map((order,idx,arr)=>(
                  <div key={order.id} style={{display:"flex",alignItems:"flex-start",gap:8}}>
                    <div style={{paddingTop:15,flexShrink:0}}><input type="checkbox" checked={checkedOrders.has(order.id)} onChange={()=>toggleCheck(order.id)} style={{width:18,height:18,cursor:"pointer",accentColor:"#f5c97a"}}/></div>
                    <div style={{flex:1}}>
                      <OrderCard order={order} pName={pName} sName={sName} fmtDate={fmtDate}
                        invest={invest} delOrder={delOrder} updateOrder={updateOrder}
                        confirmOrder={confirmOrder} completeOrder={completeOrder} revertOrder={revertOrder} cancelOrder={cancelOrder}
                        primaryBtn={primaryBtn} delBtn={delBtn}
                        moveOrder={null} isFirst={idx===0} isLast={idx===arr.length-1}
                        channels={channels}/>
                    </div>
                  </div>
                ))
            )}

            {/* 완료 목록 */}
            {orderTab==="완료"&&(
              viewOrders.filter(o=>o.status==="완료").length===0
                ?<div style={{textAlign:"center",color:"#909888",padding:26,fontSize:14}}>완료 주문이 없습니다.</div>
                :viewOrders.filter(o=>o.status==="완료").map((order,idx,arr)=>(
                  <OrderCard key={order.id} order={order} pName={pName} sName={sName} fmtDate={fmtDate}
                    invest={invest} delOrder={delOrder} updateOrder={updateOrder}
                    confirmOrder={confirmOrder} completeOrder={completeOrder} revertOrder={revertOrder} cancelOrder={cancelOrder}
                    primaryBtn={primaryBtn} delBtn={delBtn}
                    moveOrder={null} isFirst={idx===0} isLast={idx===arr.length-1}
                    channels={channels}/>
                ))
            )}
          </div>
        )}

        {/* ════ BOM관리 ════ */}
        {tab==="BOM관리"&&(
          <div>
            <SecTitle icon="🔧" title="BOM (완제품 구성품) 관리"/>
            <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
              <div style={{flex:"0 0 200px",minWidth:160}}>
                <div style={{color:"#c8a06a",fontSize:12,marginBottom:8}}>완제품 선택</div>
                {pMaster.map(p=>(<div key={p.code} onClick={()=>setBomPCode(p.code)} style={{padding:"8px 12px",borderRadius:8,cursor:"pointer",marginBottom:5,background:bomPCode===p.code?"rgba(200,130,26,.28)":"rgba(255,255,255,.05)",border:"1px solid "+(bomPCode===p.code?"#c8821a":"#c8821a22"),color:bomPCode===p.code?"#f5c97a":"#c8a06a",fontSize:13}}><span style={{color:"#9a7050",fontSize:11}}>[{p.code}] </span>{p.name}<span style={{float:"right",color:"#8a6040",fontSize:11}}>{bomOf(p.code).length}개</span></div>))}
              </div>
              <div style={{flex:1,minWidth:280}}>
                {bomPCode?(
                  <>
                    <div style={{color:"#f5c97a",fontWeight:700,fontSize:15,marginBottom:14}}>📋 [{bomPCode}] {pName(bomPCode)} <span style={{color:"#8a6a40",fontSize:12}}>({bomOf(bomPCode).length}/10개)</span></div>
                    {bomOf(bomPCode).length===0&&<div style={{textAlign:"center",color:"#8a6a40",padding:20,fontSize:14}}>구성품이 없습니다.</div>}
                    <Tbl headers={["코드","구성품명","수량","삭제"]}>
                      {bomOf(bomPCode).map(comp=>(<tr key={comp.id}><Td><span style={{color:"#9a7050",fontSize:12}}>{comp.s_code}</span></Td><Td style={{color:"#f5c97a"}}>{sName(comp.s_code)}</Td><Td><BomQtyInput id={comp.id} initQty={comp.qty} onSave={editBomQty}/></Td><Td><button onClick={()=>delBomComp(comp.id,comp.s_code)} style={delBtn}>✕</button></Td></tr>))}
                    </Tbl>
                    <div style={{display:"flex",gap:8,alignItems:"flex-end",marginTop:14,borderTop:"1px solid #c8821a33",paddingTop:14}}>
                      <div><div style={lbl}>구성품 선택</div><select value={newComp.sCode||sMaster[0]?.code||""} onChange={e=>setNewComp(f=>({...f,sCode:e.target.value}))} style={sel}>{sMaster.map(s=><option key={s.code} value={s.code}>[{s.code}] {s.name}</option>)}</select></div>
                      <LblInp label="수량" type="number" value={newComp.qty} onChange={v=>setNewComp(f=>({...f,qty:v}))} placeholder="1" width={80}/>
                      <button onClick={addBomComp} style={{...primaryBtn,alignSelf:"flex-end"}}>+ 추가</button>
                    </div>
                  </>
                ):<div style={{textAlign:"center",color:"#909888",padding:26,fontSize:14}}>왼쪽에서 완제품을 선택하세요.</div>}
              </div>
            </div>
          </div>
        )}

        {/* ════ 제품마스터 ════ */}
        {tab==="제품마스터"&&(
          <div>
            <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:280}}>
                <SecTitle icon="🏷" title="낱개 제품 코드 마스터"/>
                <Tbl headers={["색상","코드","제품명","삭제"]}>
                  {sMaster.map(s=>{const c=sColor(s.code);return(
                    <tr key={s.code}>
                      <Td><div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>{[...COLORS,""].map(col=>(<div key={col} onClick={()=>saveColor(s.code,col)} style={{width:18,height:18,borderRadius:"50%",cursor:"pointer",background:col||"transparent",border:c===col?"3px solid #fff":"2px solid #6a6a64",boxSizing:"border-box",outline:c===col?"2px solid #c8821a":"none",flexShrink:0,...(col===""?{backgroundImage:"repeating-linear-gradient(45deg,#888 0,#888 2px,transparent 2px,transparent 6px)"}:{})}} title={col||"없음"}/>))}</div></Td>
                      <Td><span style={{color:"#c8821a",fontWeight:700}}>{s.code}</span></Td>
                      <Td><div style={{display:"flex",alignItems:"center",gap:6}}>{c&&<div style={{width:12,height:12,borderRadius:"50%",background:c,border:"1px solid rgba(255,255,255,.3)"}}/>}<span style={{color:c||"#f5c97a",fontWeight:600}}>{s.name}</span></div></Td>
                      <Td><button onClick={()=>delSMaster(s.code)} style={delBtn}>✕</button></Td>
                    </tr>
                  );})}
                </Tbl>
                <div style={{display:"flex",gap:8,marginTop:14,alignItems:"flex-end"}}>
                  <LblInp label="코드 (예: S008)" value={newSingle.code} onChange={v=>setNewSingle(f=>({...f,code:v}))} placeholder="S008" width={110}/>
                  <LblInp label="제품명" value={newSingle.name} onChange={v=>setNewSingle(f=>({...f,name:v}))} placeholder="신제품명" width={150}/>
                  <button onClick={addSMaster} style={{...primaryBtn,alignSelf:"flex-end"}}>+ 등록</button>
                </div>
              </div>
              <div style={{flex:1,minWidth:280}}>
                <SecTitle icon="📦" title="완제품 코드 마스터"/>
                <Tbl headers={["코드","제품명","BOM","삭제"]}>
                  {pMaster.map(p=>(<tr key={p.code}><Td><span style={{color:"#c8821a",fontWeight:700}}>{p.code}</span></Td><Td style={{color:"#f5c97a"}}>{p.name}</Td><Td><span style={{color:"#c8a06a",fontSize:12}}>{bomOf(p.code).length}개</span></Td><Td><button onClick={()=>delPMaster(p.code)} style={delBtn}>✕</button></Td></tr>))}
                </Tbl>
                <div style={{display:"flex",gap:8,marginTop:14,alignItems:"flex-end"}}>
                  <LblInp label="코드 (예: P005)" value={newProduct.code} onChange={v=>setNewProduct(f=>({...f,code:v}))} placeholder="P005" width={110}/>
                  <LblInp label="제품명" value={newProduct.name} onChange={v=>setNewProduct(f=>({...f,name:v}))} placeholder="신완제품명" width={150}/>
                  <button onClick={addPMaster} style={{...primaryBtn,alignSelf:"flex-end"}}>+ 등록</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ════ 생산로그 ════ */}
        {tab==="생산로그"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <SecTitle icon="📋" title="생산 완료 로그"/>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <select value={logFilter} onChange={e=>setLogFilter(e.target.value)} style={{...inp,cursor:"pointer",width:"auto"}}>
                  <option>전체</option>
                  {pMaster.map(p=><option key={p.code} value={p.code}>[{p.code}] {p.name}</option>)}
                </select>
              </div>
            </div>
            {/* 11번: 날짜 조회 */}
            <div style={{background:"rgba(255,255,255,.05)",border:"1px solid #7a8a7044",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{color:"#c8ddb8",fontWeight:700,fontSize:13}}>📅 날짜 조회</span>
              {[["all","전체"],["single","특정날짜"],["range","기간"]].map(([mode,label])=>(
                <button key={mode} onClick={()=>setLogDateMode(mode)} style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,background:logDateMode===mode?"#6a8a5a":"rgba(255,255,255,.1)",color:logDateMode===mode?"#fff":"#c8c8b8",fontWeight:logDateMode===mode?700:400}}>{label}</button>
              ))}
              {logDateMode==="single"&&(
                <input type="date" value={logSingleDate} onChange={e=>setLogSingleDate(e.target.value)} style={{...inp,width:160}}/>
              )}
              {logDateMode==="range"&&(<>
                <input type="date" value={logDateRange.from} onChange={e=>setLogDateRange(r=>({...r,from:e.target.value}))} style={{...inp,width:150}}/>
                <span style={{color:"#8a9a88"}}>~</span>
                <input type="date" value={logDateRange.to} onChange={e=>setLogDateRange(r=>({...r,to:e.target.value}))} style={{...inp,width:150}}/>
              </>)}
              <span style={{fontSize:12,color:"#8a9a88"}}>{filteredLog.length}건</span>
            </div>
            {filteredLog.length===0&&<div style={{textAlign:"center",color:"#909888",padding:26,fontSize:14}}>생산 로그가 없습니다.</div>}
            <Tbl headers={["시각","업체","완제품","수량","LOT","작업자","투입 낱개 상세","관리"]}>
              {filteredLog.map(log=>{
                const ch=channels.find(c=>c.name===log.channel);
                return(<tr key={log.id}>
                  <Td style={{fontSize:12,color:"#9a8060",whiteSpace:"nowrap"}}>{new Date(log.created_at).toLocaleString("ko-KR")}</Td>
                  <Td>{log.channel?<ChannelBadge name={log.channel} color={ch?.color} color2={ch?.color2} size="sm"/>:"-"}</Td>
                  <Td><div style={{color:"#9a7050",fontSize:11}}>[{log.p_code}]</div><div style={{color:"#f5c97a",fontWeight:600}}>{pName(log.p_code)}</div></Td>
                  <Td>{log.qty}</Td>
                  <Td>{log.lot?<span style={{color:"#f5c97a",fontWeight:700,fontSize:14}}>{log.lot}</span>:<span style={{color:"#6fcf97"}}>{fmtDate(log.fin_exp)}</span>}</Td>
                  <Td style={{fontSize:12,color:"#8ac8d8"}}>{log.worker_id||"-"}</Td>
                  <Td style={{fontSize:12}}>{(log.details||[]).map((c,j)=>(<div key={j} style={{marginBottom:3}}><span style={{color:"#9a7050",fontSize:11}}>[{c.sCode}] </span><span style={{color:"#f5c97a"}}>{sName(c.sCode)}</span>{" "}{(c.used||[]).map((u,k)=><span key={k} style={{color:"#c8a06a",marginRight:4}}>{fmtDate(u.expiry)}({u.qty})</span>)}</div>))}</Td>
                  <Td><button onClick={()=>delLog(log)} style={{background:"rgba(180,50,50,.25)",border:"1px solid #c0504055",color:"#f08080",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600,whiteSpace:"nowrap"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(200,60,60,.45)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(180,50,50,.25)"}>삭제</button></Td>
                </tr>);
              })}
            </Tbl>
          </div>
        )}

        {/* ════ 설정 ════ */}
        {tab==="설정"&&(
          <div>
            <SecTitle icon="⚙️" title="시스템 설정"/>

            {/* 업체 관리 */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid #7a8a7044",borderRadius:12,padding:"20px 22px",marginBottom:24}}>
              <div style={{fontSize:15,fontWeight:700,color:"#c8ddb8",marginBottom:6}}>🏢 출고 업체 관리</div>
              <div style={{fontSize:12,color:"#8a9a88",marginBottom:16}}>등록된 업체가 생산 주문 드롭다운에 표시됩니다.</div>

              {channels.length===0&&<div style={{textAlign:"center",color:"#8a9a88",padding:16,fontSize:14}}>등록된 업체가 없습니다.</div>}
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                {channels.map((ch,idx,arr)=>(
                  <div key={ch.id} style={{display:"flex",alignItems:editChId===ch.id?"flex-start":"center",gap:10,padding:"10px 14px",background:"rgba(255,255,255,.05)",border:"1px solid "+(editChId===ch.id?"#c8821a77":"#7a8a7044"),borderRadius:10,flexWrap:"wrap"}}>
                    {editChId===ch.id?(
                      <div style={{width:"100%",background:"rgba(200,130,26,.08)",border:"1px solid #c8821a44",borderRadius:8,padding:"14px 16px"}}>
                        <div style={{fontSize:12,color:"#c8a06a",fontWeight:700,marginBottom:12}}>✏️ 업체 수정 중: {ch.name}</div>
                        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
                          <div>
                            <div style={{fontSize:12,color:"#c8a06a",marginBottom:4}}>업체명</div>
                            <input value={editChData.name} onChange={e=>setEditChData(d=>({...d,name:e.target.value}))}
                              style={{...inp,width:140}} placeholder="업체명"/>
                          </div>
                          <ColorPicker label="색상1" value={editChData.color} onChange={v=>setEditChData(d=>({...d,color:v}))}/>
                          <ColorPicker label="색상2 (선택)" value={editChData.color2} onChange={v=>setEditChData(d=>({...d,color2:v}))}/>
                          {editChData.name&&<div style={{alignSelf:"flex-end",paddingBottom:2}}>
                            <div style={{fontSize:11,color:"#8a9a88",marginBottom:4}}>미리보기</div>
                            <ChannelBadge name={editChData.name} color={editChData.color} color2={editChData.color2}/>
                          </div>}
                        </div>
                        <div style={{display:"flex",gap:8,marginTop:14,borderTop:"1px solid #c8821a22",paddingTop:12}}>
                          <button onClick={saveEditCh}
                            style={{background:"linear-gradient(135deg,#5a7a4a,#7a9a6a)",border:"none",borderRadius:8,color:"#fff",padding:"8px 24px",fontSize:14,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                            💾 저장
                          </button>
                          <button onClick={()=>setEditChId(null)}
                            style={{background:"rgba(255,255,255,.08)",border:"1px solid #7a8a7055",borderRadius:8,color:"#c8a06a",padding:"8px 18px",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
                            취소
                          </button>
                        </div>
                      </div>
                    ):(
                      <>
                        <ChannelBadge name={ch.name} color={ch.color} color2={ch.color2}/>
                        <div style={{display:"flex",gap:4}}>
                          <div style={{width:18,height:18,borderRadius:4,background:ch.color||"#555",border:"2px solid rgba(255,255,255,.3)"}}/>
                          {ch.color2&&<div style={{width:18,height:18,borderRadius:4,background:ch.color2,border:"2px solid rgba(255,255,255,.3)"}}/>}
                        </div>
                        <span style={{fontSize:12,padding:"2px 8px",borderRadius:10,background:ch.active!==false?"rgba(76,175,80,.2)":"rgba(160,60,60,.2)",color:ch.active!==false?"#6fcf97":"#e89090",border:"1px solid "+(ch.active!==false?"#4caf5044":"#c0606044")}}>{ch.active!==false?"활성":"비활성"}</span>
                        <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
                          {/* 순서 이동 */}
                          <div style={{display:"flex",flexDirection:"column",gap:2}}>
                            <button onClick={async()=>{
                              if(idx===0)return;
                              const prev=arr[idx-1];
                              const prevOrder=prev.sort_order??idx-1;
                              const curOrder=ch.sort_order??idx;
                              await Promise.all([
                                sb.from("drip2_channels").update({sort_order:prevOrder}).eq("id",ch.id),
                                sb.from("drip2_channels").update({sort_order:curOrder}).eq("id",prev.id),
                              ]);
                              setChannels(p=>{const n=[...p];const pi=n.findIndex(x=>x.id===prev.id);const ci=n.findIndex(x=>x.id===ch.id);[n[pi],n[ci]]=[n[ci],n[pi]];return n;});
                            }} disabled={idx===0} style={{background:"rgba(255,255,255,.08)",border:"1px solid #7a8a7044",borderRadius:4,color:"#a8b8a0",padding:"1px 7px",fontSize:12,cursor:idx===0?"default":"pointer",opacity:idx===0?.3:1,fontFamily:"inherit"}}>▲</button>
                            <button onClick={async()=>{
                              if(idx===arr.length-1)return;
                              const next=arr[idx+1];
                              const nextOrder=next.sort_order??idx+1;
                              const curOrder=ch.sort_order??idx;
                              await Promise.all([
                                sb.from("drip2_channels").update({sort_order:nextOrder}).eq("id",ch.id),
                                sb.from("drip2_channels").update({sort_order:curOrder}).eq("id",next.id),
                              ]);
                              setChannels(p=>{const n=[...p];const ci=n.findIndex(x=>x.id===ch.id);const ni=n.findIndex(x=>x.id===next.id);[n[ci],n[ni]]=[n[ni],n[ci]];return n;});
                            }} disabled={idx===arr.length-1} style={{background:"rgba(255,255,255,.08)",border:"1px solid #7a8a7044",borderRadius:4,color:"#a8b8a0",padding:"1px 7px",fontSize:12,cursor:idx===arr.length-1?"default":"pointer",opacity:idx===arr.length-1?.3:1,fontFamily:"inherit"}}>▼</button>
                          </div>
                          <button onClick={()=>toggleChActive(ch.id,ch.active===false)} style={{background:"rgba(255,255,255,.08)",border:"1px solid #7a8a7055",borderRadius:6,color:"#c8ddb8",padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{ch.active!==false?"비활성화":"활성화"}</button>
                          <button onClick={()=>startEditCh(ch)} style={{background:"rgba(200,130,26,.2)",border:"1px solid #c8821a44",borderRadius:6,color:"#c8a06a",padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✏️ 수정</button>
                          <button onClick={()=>delChannel(ch.id)} style={{...delBtn,padding:"4px 10px",fontSize:12}}>✕ 삭제</button>
                        </div>
                      </>
                    )}
                  </div>
                ))}
              </div>

              {/* 업체 추가 */}
              <div style={{borderTop:"1px solid #7a8a7033",paddingTop:16}}>
                <div style={{fontSize:13,color:"#a8b8a0",marginBottom:10,fontWeight:600}}>➕ 새 업체 추가</div>
                <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
                  <LblInp label="업체명" value={newChannel.name} onChange={v=>setNewChannel(f=>({...f,name:v}))} placeholder="예: 컬리" width={120}/>
                  <ColorPicker label="색상1 (필수)" value={newChannel.color} onChange={v=>setNewChannel(f=>({...f,color:v}))}/>
                  <ColorPicker label="색상2 (선택)" value={newChannel.color2} onChange={v=>setNewChannel(f=>({...f,color2:v}))}/>
                  {newChannel.name&&<div style={{alignSelf:"flex-end",paddingBottom:2}}><ChannelBadge name={newChannel.name} color={newChannel.color} color2={newChannel.color2}/></div>}
                  <button onClick={addChannel} style={{...primaryBtn,alignSelf:"flex-end"}}>+ 등록</button>
                </div>
              </div>
            </div>

            {/* 내 비밀번호 변경 */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid #7a8a7044",borderRadius:12,padding:"20px 22px",marginBottom:24}}>
              <div style={{fontSize:15,fontWeight:700,color:"#c8ddb8",marginBottom:14}}>🔑 내 비밀번호 변경</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                <LblInp label="현재 비밀번호" type="password" value={pwChange.cur} onChange={v=>{setPwChange(p=>({...p,cur:v}));setPwChangeMsg(null);}} placeholder="현재 비밀번호" width={150}/>
                <LblInp label="새 비밀번호" type="password" value={pwChange.next} onChange={v=>{setPwChange(p=>({...p,next:v}));setPwChangeMsg(null);}} placeholder="새 비밀번호 (4자 이상)" width={160}/>
                <LblInp label="새 비밀번호 확인" type="password" value={pwChange.confirm} onChange={v=>{setPwChange(p=>({...p,confirm:v}));setPwChangeMsg(null);}} placeholder="다시 입력" width={150}/>
                <button onClick={changePw} style={{...primaryBtn,alignSelf:"flex-end"}}>변경</button>
              </div>
              {pwChangeMsg&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:8,fontSize:13,background:pwChangeMsg.type==="ok"?"rgba(76,175,80,.15)":"rgba(220,70,70,.15)",border:"1px solid "+(pwChangeMsg.type==="ok"?"#4caf5055":"#e0707055"),color:pwChangeMsg.type==="ok"?"#6fcf97":"#f08080"}}>{pwChangeMsg.msg}</div>}
            </div>

            {/* 계정 정보 */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid #7a8a7044",borderRadius:12,padding:"20px 22px"}}>
              <div style={{fontSize:15,fontWeight:700,color:"#c8ddb8",marginBottom:14}}>👤 계정 정보</div>
              <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
                <div style={{background:"rgba(255,255,255,.06)",borderRadius:8,padding:"12px 18px"}}>
                  <div style={{fontSize:12,color:"#8a9a88",marginBottom:4}}>현재 로그인</div>
                  <div style={{color:"#f5c97a",fontWeight:700}}>👤 {user.user_id}</div>
                </div>
                <button onClick={logout} style={{background:"rgba(200,80,80,.2)",border:"1px solid #c0606055",borderRadius:8,color:"#e89090",padding:"8px 18px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>🚪 로그아웃</button>
              </div>
              <div style={{marginTop:16,padding:"10px 14px",background:"rgba(100,160,80,.1)",border:"1px solid #6a9a5033",borderRadius:8,fontSize:12,color:"#a8c898",lineHeight:1.6}}>
                💡 새 계정 추가 / 비밀번호 초기화는 로그인 화면의 <strong style={{color:"#c8ddb8"}}>계정 만들기 / 비밀번호 변경</strong> 탭을 이용하세요. (마스터 코드 필요)
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
